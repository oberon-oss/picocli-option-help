name: CI / Snapshot

on:
    push:
        branches:
            - master
            - 'feature/**'
            - 'bug/**'
            - 'fix/**'
            - 'hotfix/**'
    pull_request:
        branches:
            - master
    workflow_dispatch:

jobs:
    snapshot:
        uses: oberon-oss/github-workflows/.github/workflows/maven-snapshot.yml@291b7d53d9bad56997f5af3f0d2035c11ca001b2
        with:
            java-version: '25'
            snapshot-branch: master
            sonar-enabled: ${{ github.ref == 'refs/heads/master' || github.event_name == 'pull_request' }}
            sonar-maven-profile: coverage
            snapshot-maven-profiles: generate-javadoc-and-source
            sonar-project-key: eu.oberon-oss:picocli-option-help
        secrets:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
            CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}