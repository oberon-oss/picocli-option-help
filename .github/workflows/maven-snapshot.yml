name: CI / Snapshot

on:
    push:
        branches:
            - master
            - 'feature/**'
            - 'bug/**'
            - 'fix/**'
            - 'hotfix/**'
    pull_request:
        branches:
            - master
    workflow_dispatch:

jobs:
    snapshot:
        uses: oberon-oss/github-workflows/.github/workflows/maven-snapshot.yml@943f8beb2855a375762871682fdbbe5095c62409
        with:
            java-version: '25'
            snapshot-branch: ${{ github.ref_name }}
            sonar-enabled: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
            sonar-maven-profile: coverage
            sonar-quality-gate-blocking: false
            snapshot-maven-profiles: generate-javadoc-and-source
            sonar-project-key: eu.oberon-oss:picocli-option-help
        secrets:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
            CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}