name: CI

on:
    push:
        branches:
            - master
            - 'feature/**'
            - 'bug/**'
            - 'fix/**'
            - 'hotfix/**'
    pull_request:
        branches:
            - master
    workflow_dispatch:
jobs:
    analyze:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0
            -   uses: actions/setup-java@v4
                with:
                    java-version: '25'
                    distribution: 'temurin'
                    cache: maven
            -   name: Analyze with SonarCloud
                env:
                    MAVEN_OPTS: --sun-misc-unsafe-memory-access=allow
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                run: mvn -B clean verify -Pcoverage sonar:sonar -Dsonar.qualitygate.wait=true

    publish-snapshot:
        runs-on: ubuntu-latest
        needs: analyze

        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

        permissions:
            contents: read

        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-java@v4
                with:
                    java-version: '25'
                    distribution: 'temurin'
                    cache: maven
                    server-id: central
                    server-username: CENTRAL_USERNAME
                    server-password: CENTRAL_PASSWORD

            -   name: Read Maven project version
                id: project-version
                run: |
                    VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
                    echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            -   name: Publish SNAPSHOT
                if: endsWith(steps.project-version.outputs.version, '-SNAPSHOT')
                env:
                    MAVEN_OPTS: --sun-misc-unsafe-memory-access=allow
                    CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
                    CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
                run: mvn -B -DskipTests deploy -Pgenerate-javadoc-and-source

            -   name: Skip SNAPSHOT publishing
                if: ${{ !endsWith(steps.project-version.outputs.version, '-SNAPSHOT') }}
                run: echo "Project version '${{ steps.project-version.outputs.version }}' is not a SNAPSHOT version. Skipping snapshot deployment."