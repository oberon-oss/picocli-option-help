name: Publish package to Maven Central

on:
    release:
        types:
            - created

jobs:
    release:
        uses: oberon-oss/github-workflows/.github/workflows/maven-release.yml@ab7ee56472759e7dfd183b7572567cb57ee41a4d
        with:
            java-version: '25'
            release-maven-profiles: central-release,generate-javadoc-and-source
        secrets:
            CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
            CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
            GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
            GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}